name: Daily Security Tool Builder
on:
  schedule:
    # GitHub cron is UTC. 07:15 UTC ≈ 08:15 UK during BST.
    - cron: '15 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-security-tool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name 'security-builder[bot]'
          git config user.email '41898282+security-builder[bot]@users.noreply.github.com'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # Extra safeguard: verify all env is present before running the agent
      - name: Validate Azure OpenAI config
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -eu
          echo "🔧 Security Tool Builder Configuration"
          echo "Endpoint: ${AZURE_OPENAI_ENDPOINT}"
          echo "Deployment: ${AZURE_OPENAI_DEPLOYMENT}" 
          echo "API version: ${AZURE_OPENAI_API_VERSION}"
          test -n "${AZURE_OPENAI_ENDPOINT}"
          test -n "${AZURE_OPENAI_DEPLOYMENT}"
          test -n "${AZURE_OPENAI_API_VERSION}"
          test -n "${AZURE_OPENAI_API_KEY}"
          echo "✅ Configuration validated."

      # Check security tool backlog status
      - name: Check security tool backlog
        run: |
          echo "🔍 Checking security tool backlog..."
          # Count ready security tools in backlog/security_tools.yml
          ready_count=$(python -c "
          import yaml
          with open('backlog/security_tools.yml', 'r') as f:
              data = yaml.safe_load(f)
          ready_tools = [tool for tool in data.get('security_tools', []) if tool.get('ready', False) and tool.get('status') == 'todo']
          print(f'Found {len(ready_tools)} ready security tools in backlog')
          print('Ready tools:', [tool['id'] for tool in ready_tools])
          ")
          echo "Security backlog status: $ready_count"

      - name: Build security tool
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # for gh cli
          PYTHONPATH: .
        run: |
          echo "🛡️ Starting security tool builder..."
          python -m agent.agent
