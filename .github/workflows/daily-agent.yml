name: Daily Feature Agent
on:
  schedule:
    # GitHub cron is UTC. 07:15 UTC ≈ 08:15 UK during BST.
    - cron: '15 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Extra safeguard: verify all env is present before running the agent
      - name: Validate Azure OpenAI config
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -eu
          echo "Endpoint: ${AZURE_OPENAI_ENDPOINT}"
          echo "Deployment: ${AZURE_OPENAI_DEPLOYMENT}"
          echo "API version: ${AZURE_OPENAI_API_VERSION}"
          test -n "${AZURE_OPENAI_ENDPOINT}"
          test -n "${AZURE_OPENAI_DEPLOYMENT}"
          test -n "${AZURE_OPENAI_API_VERSION}"
          test -n "${AZURE_OPENAI_API_KEY}"
          echo "Config present."

      # Auto-grow the backlog with tiny tickets when it runs low
      - name: Generate backlog if low
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          PYTHONPATH: .
        run: |
          python scripts/generate_backlog.py --min-ready 1 --make 4

      - name: Run agent
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # for gh cli
          PYTHONPATH: .
        run: python -m agent.agent
