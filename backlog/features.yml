features:
  - id: FEAT-001
    title: "Add CLI flag --greet NAME"
    description: "If provided, print 'Hello, NAME!'. Otherwise print 'Hello, world!'."
    acceptance_tests:
      - "calling `yourcli --greet Alice` prints 'Hello, Alice!' and exits 0"
      - "calling `yourcli` prints 'Hello, world!' and exits 0"
    ready: true
    status: done
    area_allowlist:
      - "src/your_package/cli.py"
      - "tests/test_feat_001.py"
    max_changed_lines: 120

  - id: FEAT-002
    title: "Add version flag --version"
    description: "Add a --version flag that prints the version number and exits."
    acceptance_tests:
      - "calling `yourcli --version` prints version number and exits 0"
      - "calling `yourcli -v` prints version number and exits 0"
    ready: true
    status: todo
    area_allowlist:
      - "src/your_package/cli.py"
      - "src/your_package/__init__.py"
      - "tests/test_feat_002.py"
    max_changed_lines: 50

  - id: FEAT-003
    title: "Add configuration file support"
    description: "Support reading default greeting from a config file ~/.yourcli.yaml"
    acceptance_tests:
      - "if ~/.yourcli.yaml contains 'default_name: World', calling `yourcli` prints 'Hello, World!'"
      - "command line --greet flag overrides config file setting"
      - "if no config file exists, behavior remains unchanged"
    ready: true
    status: todo
    area_allowlist:
      - "src/your_package/cli.py"
      - "src/your_package/config.py"
      - "tests/test_feat_003.py"
    max_changed_lines: 200
